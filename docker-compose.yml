services:
  # ── Next.js Application (Frontend + API + ML) ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_URL=${NEXT_PUBLIC_URL:-http://localhost:3000}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_UNSPLASH_ACCESS_KEY=${NEXT_PUBLIC_UNSPLASH_ACCESS_KEY}
        - NEXT_PUBLIC_GOOGLE_MAPS_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_KEY}
        - GOOGLE_API_KEY=${GOOGLE_API_KEY}
        - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
        - QSTASH_URL=${QSTASH_URL}
        - QSTASH_TOKEN=${QSTASH_TOKEN}
        - QSTASH_CURRENT_SIGNING_KEY=${QSTASH_CURRENT_SIGNING_KEY}
        - QSTASH_NEXT_SIGNING_KEY=${QSTASH_NEXT_SIGNING_KEY}
        - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}
        - UNSPLASH_SECRET_KEY=${UNSPLASH_SECRET_KEY}
        - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
        - EXCHANGERATE_API_KEY=${EXCHANGERATE_API_KEY}
        - AMADEUS_API_KEY=${AMADEUS_API_KEY}
        - AMADEUS_API_SECRET=${AMADEUS_API_SECRET}
        - FOURSQUARE_API_KEY=${FOURSQUARE_API_KEY}
    container_name: travelplan-app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - travel-net
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Redis (Caching Layer) ──
  redis:
    image: redis:7-alpine
    container_name: travelplan-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - travel-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: travelplan-nginx
    restart: unless-stopped
    ports:
      - "8282:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - travel-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
    driver: local

networks:
  travel-net:
    driver: bridge
